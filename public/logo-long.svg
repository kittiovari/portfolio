<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 62" fill="none">
  <defs>
    <linearGradient id="cl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4956A"/>
      <stop offset="45%" stop-color="#C26D45"/>
      <stop offset="100%" stop-color="#8B4A2D"/>
    </linearGradient>
  </defs>

  <!-- "H. " ultralight -->
  <text x="0" y="46" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="42" font-weight="100" fill="url(#cl)" letter-spacing="1">H.</text>

  <!-- Ó from logo — thicker strokes matching short logo proportions -->
  <g transform="translate(55, 2) scale(0.30)">
    <path d="M 58 58 C 90 58, 114 84, 114 120 C 114 156, 90 182, 58 182 C 26 182, 2 156, 2 120 C 2 84, 26 58, 58 58 Z"
          stroke="url(#cl)" stroke-width="8" fill="none"/>
    <path d="M 52 44 L 64 28" stroke="url(#cl)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- "vári" tighter to Ó -->
  <text x="94" y="46" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="42" font-weight="100" fill="url(#cl)" letter-spacing="1">vári</text>

  <!-- K from logo — thicker strokes -->
  <g transform="translate(198, 2) scale(0.30)">
    <path d="M 10 52 L 10 188" stroke="url(#cl)" stroke-width="8" stroke-linecap="round"/>
    <path d="M 10 118 C 20 118, 30 106, 38 94 C 46 82, 52 68, 60 56 C 63 51, 66 48, 70 46"
          stroke="url(#cl)" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M 20 126 C 30 138, 40 152, 50 164 C 56 172, 62 180, 70 188"
          stroke="url(#cl)" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- "itti" -->
  <text x="224" y="46" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="42" font-weight="100" fill="url(#cl)" letter-spacing="1">itti</text>
</svg>
